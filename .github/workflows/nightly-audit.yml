name: nightly-audit

# The verifier runs against the LIVE mandate history every night and publishes its verdict to the
# dedicated `audit-log` git ref (plan §18.2 [DECIDED — CI push]). The dashboard proxy fetches that
# raw file and splices it into /api/events → the scoreboard band. The git history of `audit-log` is
# itself a tamper-evident audit trail. `workflow_dispatch` allows a manual pre-demo run.
#
# Publishing to a separate ref (not main) keeps main's history free of nightly commit churn, and a
# green run here is the README's "continuously audited autonomy" badge.

on:
  schedule:
    - cron: '17 7 * * *' # 07:17 UTC nightly (offset off the hour to dodge the cron rush)
  workflow_dispatch: {}

# The job pushes one file to the audit-log ref — nothing else needs write.
permissions:
  contents: write

concurrency:
  group: nightly-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install
        run: npm ci

      - name: Run the verifier over live history
        id: verify
        # Exit codes: 0 = COMPLIANT, 1 = VIOLATION (still publish — that's the product working),
        # 2 = operational error (do NOT publish; keep the last good verdict so an RPC flake at
        # 3am never renders plumbing-red on the dashboard).
        run: |
          set +e
          npx tsx verifier/src/cli.ts --json > verdicts.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 2 ]; then
            echo "::warning::verifier hit an operational error (exit 2) — not publishing; last verdict stands"
            exit 0
          fi
          node -e "const v=require('./verdicts.json'); console.log('compliant:', v.compliant, '| moves:', v.totalMoves, '| through:', v.scannedThroughBlock)"

      - name: Publish to the audit-log ref
        # success() ensures a FAILED verify step (e.g. malformed verdicts.json) never publishes;
        # exit 2 (operational) also holds the last good verdict. Both gates required.
        if: success() && steps.verify.outputs.exit_code != '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Validate the file parses BEFORE touching git — never publish garbage. Build the commit
          # message in its own step so a parse failure aborts here (command substitution under
          # `set -e` does not abort the outer command, so do it explicitly).
          msg="$(node -e "const v=require('./verdicts.json'); if(typeof v.compliant!=='boolean'||typeof v.totalMoves!=='number'){process.exit(1)} process.stdout.write('audit: '+(v.compliant?'COMPLIANT':'VIOLATION')+' — '+v.totalMoves+' moves @ '+(v.scannedThroughBlock||'?'))")"
          [ -n "$msg" ] || { echo "::error::verdicts.json failed validation — not publishing"; exit 1; }

          git config user.name "yield-audit-bot"
          git config user.email "yield-audit-bot@users.noreply.github.com"

          # Append to the REAL audit-log history (the tamper-evident trail): fetch the existing ref
          # into a throwaway checkout, commit the new verdict on top, and push WITHOUT force. A
          # throwaway `git init` + `push -f` would obliterate the history every night.
          new_verdict="$(pwd)/verdicts.json"
          tmp="$(mktemp -d)"
          cd "$tmp"
          git init -q
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git fetch -q "$remote" audit-log 2>/dev/null; then
            git checkout -q -b audit-log FETCH_HEAD
          else
            echo "audit-log ref not found — creating it"
            git checkout -q -b audit-log
          fi
          cp "$new_verdict" verdicts.json
          git add verdicts.json
          # Skip an empty commit if the verdict is byte-identical to last night's.
          if git diff --cached --quiet; then
            echo "verdict unchanged since last run — nothing to publish"
            exit 0
          fi
          git commit -q -m "$msg"
          git push "$remote" audit-log:audit-log
