name: ci

# TypeScript workspaces: install, typecheck, and run the shared + agent test suites
# (schema fixtures + decision-rule property tests). Contracts have their own real-EVM job
# in arc-verify.yml.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: npm run typecheck
      - run: npm test
